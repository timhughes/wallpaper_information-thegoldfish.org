<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Monitor Body (GNOME Blue 3) -->
    <rect x="16" y="24" width="96" height="72" rx="8" fill="#3584e4"/>
    
    <!-- Monitor Stand -->
    <path d="M48 96H80L84 108H44L48 96Z" fill="#77767b"/>
    <rect x="32" y="108" width="64" height="4" rx="2" fill="#77767b"/>
    
    <!-- Screen Surface (Black) -->
    <rect x="22" y="30" width="84" height="60" rx="4" fill="black" fill-opacity="0.1"/>
    
    <!-- HUD Overlay in Top-Left (Approx 1/4 size) -->
    <!-- Background for HUD -->
    <rect x="26" y="34" width="32" height="24" rx="3" fill="black" fill-opacity="0.3"/>
    
    <!-- HUD Data Lines (White/Light Blue) -->
    <rect x="30" y="38" width="12" height="2" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="30" y="42" width="18" height="2" rx="1" fill="white" fill-opacity="0.7"/>
    <rect x="30" y="46" width="10" height="2" rx="1" fill="white" fill-opacity="0.5"/>
    
    <!-- Accent Dot (Information indicator) -->
    <circle cx="50" cy="39" r="1.5" fill="#f6d32d"/>
</svg>
